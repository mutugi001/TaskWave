version: '3.8'

services:
  app:
    image: collinsmutugi/taskwave-frontend:v2.0
    container_name: frontend_app
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"  # Map host port 8080 to container port 80
    environment:
      - REACT_APP_BACKEND_URL="http://localhost:8000"  # Set environment variables if needed

  backend:
    image: collinsmutugi/taskwave-backend:v2.0
    container_name: backend_app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8000:8000"  # Map host port 8000 to container port 8000
    environment:
      - APP_NAME=Laravel
      - APP_ENV=local
      - APP_KEY=base64:PKDArkwcUH4VvuZ8Auiti0o04iof9ejI4BMmWYFBNBo=
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - APP_LOCALE=en
      - APP_FALLBACK_LOCALE=en
      - APP_FAKER_LOCALE=en_US
      - APP_MAINTENANCE_DRIVER=file
      - PHP_CLI_SERVER_WORKERS=4
      - BCRYPT_ROUNDS=12
      - LOG_CHANNEL=stack
      - LOG_STACK=single
      - LOG_DEPRECATIONS_CHANNEL=null
      - LOG_LEVEL=debug
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=taskwave
      - DB_USERNAME=root
      - DB_PASSWORD=mutush04
      - SESSION_DRIVER=database
      - SESSION_LIFETIME=120
      - SESSION_ENCRYPT=false
      - SESSION_PATH=/
      - SESSION_DOMAIN=null
      - SANCTUM_STATEFUL_DOMAINS=localhost:5173
      - BROADCAST_CONNECTION=log
      - FILESYSTEM_DISK=local
      - QUEUE_CONNECTION=database
      - CACHE_STORE=database
      - MAIL_MAILER=log
      - MAIL_SCHEME=null
      - MAIL_HOST=127.0.0.1
      - MAIL_PORT=2525
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_FROM_ADDRESS="hello@example.com"
      - MAIL_FROM_NAME="${APP_NAME}"
      - VITE_APP_NAME="${APP_NAME}"
      - FRONTEND_URL=http://localhost:8080
    volumes:
      - backend_data:/app/storage

  db:
    image: collinsmutugi/taskwave-db:v2.0
    container_name: db_container
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=mutush04
      - MYSQL_DATABASE=taskwave
      - MYSQL_PASSWORD=mutush04
    ports:
      - "3306:3306"  # Map host port 3307 to container port 3306
    volumes:
      - db_data:/var/lib/mysql

volumes:
  backend_data:
    driver: local
  db_data:
    driver: local
