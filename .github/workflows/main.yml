name: CI/CD Pipeline

on:
  push:
    branches:
      - main


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v3
        with:
          context: ./TaskWave-Frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taskwave-frontend:${{ github.sha }}, ${{ secrets.DOCKER_USERNAME }}/taskwave-frontend:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v3
        with:
          context: ./Backend-new/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taskwave-backend:${{ github.sha }}, ${{ secrets.DOCKER_USERNAME }}/taskwave-backend:latest
      
      - name: Build and push db image
        uses: docker/build-push-action@v3
        with:
          context: ./DB/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taskwave-db:${{ github.sha }}, ${{ secrets.DOCKER_USERNAME }}/taskwave-db:latest

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to production server
        run:
          ssh ${{ secrets.SERVER_BOT }}@${{ secrets.SERVER_IP }} "~/deploy.sh"
